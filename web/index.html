<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transcriptor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: "#0a0c12", surface: "#12151e", surface2: "#1a1f2b", surface3: "#212736",
            edge: "#262d3d", edgehi: "#333c50",
            ink: "#eaeef6", muted: "#8a94a6", faint: "#5c6576",
            accent: "#7c8bff", accent2: "#a879ff",
          },
          fontFamily: {
            sans: ["Inter", "system-ui", "sans-serif"],
            mono: ["JetBrains Mono", "ui-monospace", "monospace"],
          },
          keyframes: { blink: { "50%": { opacity: "0" } } },
          animation: { blink: "blink 1s step-start infinite" },
        },
      },
    };
  </script>
</head>
<body class="bg-bg text-ink font-sans antialiased min-h-screen">
  <div class="fixed left-1/2 -translate-x-1/2 -top-[280px] w-[900px] h-[600px] pointer-events-none z-0 bg-[radial-gradient(closest-side,rgba(124,139,255,0.16),transparent_70%)]"></div>

  <main class="relative z-10 max-w-[820px] mx-auto px-[22px] pt-14 pb-24">
    <header class="mb-8">
      <div class="flex items-center gap-3 text-[24px] font-bold tracking-tight">
        <svg class="w-[30px] h-[30px] text-accent drop-shadow-[0_0_10px_rgba(124,139,255,0.5)]" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 3v18M8 7v10M16 7v10M4 10v4M20 10v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>Transcriptor</span>
      </div>
      <p class="text-muted mt-2">Upload media — chunked, streamed in order, fully traceable.</p>
    </header>

    <section class="bg-surface border border-edge rounded-2xl p-[22px] mb-[18px] shadow-[0_12px_40px_-12px_rgba(0,0,0,0.55)]">
      <label id="dropzone" class="flex items-center gap-4 p-[22px] border-[1.5px] border-dashed border-edgehi rounded-xl bg-surface2 cursor-pointer transition-colors hover:border-accent hover:bg-surface3">
        <input type="file" id="file" multiple class="hidden" />
        <svg class="w-[34px] h-[34px] text-accent shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 16V4m0 0L7 9m5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 17v2a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="flex flex-col gap-[3px] min-w-0">
          <strong id="fileName" class="font-semibold text-[15px]">Drop files here, or click to browse</strong>
          <span id="fileMeta" class="text-muted text-[12.5px] truncate">one or more audio/video files</span>
        </div>
      </label>

      <div class="grid grid-cols-2 gap-x-[22px] gap-y-4 mt-[22px] mb-5 max-[560px]:grid-cols-1">
        <div class="flex flex-col gap-2">
          <span class="text-[12px] text-muted font-medium">Model</span>
          <div class="inline-flex bg-surface2 border border-edge rounded-[10px] p-[3px] gap-[3px]">
            <input type="radio" name="tier" id="tier-fast" value="fast" checked class="peer/tf sr-only" />
            <label for="tier-fast" class="flex-1 text-center px-3.5 py-[7px] rounded-[7px] text-[13px] font-medium text-muted cursor-pointer whitespace-nowrap select-none transition-colors hover:text-ink peer-checked/tf:text-white peer-checked/tf:bg-gradient-to-br peer-checked/tf:from-accent peer-checked/tf:to-accent2 peer-checked/tf:shadow-[0_4px_14px_-4px_rgba(124,139,255,0.6)]">Fast · tiny</label>
            <input type="radio" name="tier" id="tier-strong" value="strong" class="peer/ts sr-only" />
            <label for="tier-strong" class="flex-1 text-center px-3.5 py-[7px] rounded-[7px] text-[13px] font-medium text-muted cursor-pointer whitespace-nowrap select-none transition-colors hover:text-ink peer-checked/ts:text-white peer-checked/ts:bg-gradient-to-br peer-checked/ts:from-accent peer-checked/ts:to-accent2 peer-checked/ts:shadow-[0_4px_14px_-4px_rgba(124,139,255,0.6)]">Strong · large</label>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <span class="text-[12px] text-muted font-medium">Backend</span>
          <div class="inline-flex bg-surface2 border border-edge rounded-[10px] p-[3px] gap-[3px]">
            <input type="radio" name="backend" id="be-local" value="local" checked class="peer/bl sr-only" />
            <label for="be-local" class="flex-1 text-center px-3.5 py-[7px] rounded-[7px] text-[13px] font-medium text-muted cursor-pointer whitespace-nowrap select-none transition-colors hover:text-ink peer-checked/bl:text-white peer-checked/bl:bg-gradient-to-br peer-checked/bl:from-accent peer-checked/bl:to-accent2 peer-checked/bl:shadow-[0_4px_14px_-4px_rgba(124,139,255,0.6)] peer-disabled/bl:opacity-40 peer-disabled/bl:cursor-not-allowed peer-disabled/bl:hover:text-muted">Local</label>
            <input type="radio" name="backend" id="be-hosted" value="hosted" class="peer/bh sr-only" />
            <label for="be-hosted" class="flex-1 text-center px-3.5 py-[7px] rounded-[7px] text-[13px] font-medium text-muted cursor-pointer whitespace-nowrap select-none transition-colors hover:text-ink peer-checked/bh:text-white peer-checked/bh:bg-gradient-to-br peer-checked/bh:from-accent peer-checked/bh:to-accent2 peer-checked/bh:shadow-[0_4px_14px_-4px_rgba(124,139,255,0.6)]">Remote</label>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <span class="text-[12px] text-muted font-medium">Mode</span>
          <div class="inline-flex bg-surface2 border border-edge rounded-[10px] p-[3px] gap-[3px]">
            <input type="radio" name="mode" id="mode-sync" value="sync" checked class="peer/ms sr-only" />
            <label for="mode-sync" class="flex-1 text-center px-3.5 py-[7px] rounded-[7px] text-[13px] font-medium text-muted cursor-pointer whitespace-nowrap select-none transition-colors hover:text-ink peer-checked/ms:text-white peer-checked/ms:bg-gradient-to-br peer-checked/ms:from-accent peer-checked/ms:to-accent2 peer-checked/ms:shadow-[0_4px_14px_-4px_rgba(124,139,255,0.6)]">Sync · live</label>
            <input type="radio" name="mode" id="mode-async" value="async" class="peer/ma sr-only" />
            <label for="mode-async" class="flex-1 text-center px-3.5 py-[7px] rounded-[7px] text-[13px] font-medium text-muted cursor-pointer whitespace-nowrap select-none transition-colors hover:text-ink peer-checked/ma:text-white peer-checked/ma:bg-gradient-to-br peer-checked/ma:from-accent peer-checked/ma:to-accent2 peer-checked/ma:shadow-[0_4px_14px_-4px_rgba(124,139,255,0.6)]">Async · queued</label>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <span class="text-[12px] text-muted font-medium">API token <em class="text-faint not-italic">optional</em></span>
          <input type="password" id="token" placeholder="if auth is enabled" class="w-full bg-surface2 border border-edge rounded-[10px] px-3 py-[9px] text-[13.5px] text-ink placeholder:text-faint focus:outline-none focus:border-accent" />
        </div>
      </div>

      <div class="flex items-center gap-4">
        <button id="go" class="relative rounded-[11px] px-7 py-3 font-semibold text-[15px] text-white bg-gradient-to-br from-accent to-accent2 cursor-pointer shadow-[0_8px_22px_-8px_rgba(124,139,255,0.7)] transition-transform hover:-translate-y-px active:translate-y-0 disabled:opacity-55 disabled:cursor-default disabled:hover:translate-y-0">
          <span id="spinner" class="hidden absolute left-4 top-1/2 -mt-[7px] w-3.5 h-3.5 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
          <span id="btnLabel">Transcribe</span>
        </button>
        <span id="status" class="text-muted text-[13px]"></span>
      </div>
      <p id="matrixNote" class="text-faint text-[12.5px] mt-3 min-h-[1em]"></p>
    </section>

    <section id="results" class="space-y-[18px]">
      <p id="resultsEmpty" class="text-faint text-[13px] px-1">Results appear here — one card per file, with its transcript and chunk lineage.</p>
    </section>
  </main>

  <template id="cardTpl">
    <div class="bg-surface border border-edge rounded-2xl p-[20px] shadow-[0_12px_40px_-12px_rgba(0,0,0,0.55)]">
      <div class="flex items-start justify-between gap-4 mb-3">
        <div class="min-w-0">
          <div class="font-semibold text-[15px] truncate" data-title></div>
          <div class="text-faint text-[11px] font-mono truncate mt-0.5" data-jobid>queued…</div>
        </div>
        <div class="flex items-center gap-2.5 shrink-0 pt-0.5">
          <span class="text-[12px] text-muted whitespace-nowrap" data-status></span>
          <span class="text-[11px] text-muted tabular-nums w-8 text-right" data-pct>0%</span>
          <div class="w-[90px] h-1.5 bg-surface3 rounded overflow-hidden">
            <div class="h-full w-0 bg-gradient-to-br from-accent to-accent2 rounded transition-[width] duration-300" data-bar></div>
          </div>
        </div>
      </div>
      <div class="min-h-[54px] bg-surface2 border border-edge rounded-xl px-4 py-3 text-[15px] leading-[1.7] whitespace-pre-wrap break-words" data-transcript><span class="text-faint">Waiting…</span></div>
      <details class="mt-3">
        <summary class="cursor-pointer text-faint text-[12px] select-none hover:text-muted inline-flex items-center gap-1.5">Chunk lineage <span class="text-faint" data-count></span></summary>
        <div class="overflow-x-auto mt-2">
          <table class="w-full border-collapse text-[12px]">
            <thead><tr class="[&>th]:text-left [&>th]:px-2.5 [&>th]:py-2 [&>th]:border-b [&>th]:border-edge [&>th]:text-faint [&>th]:font-semibold [&>th]:text-[10.5px] [&>th]:uppercase [&>th]:tracking-wide">
              <th>#</th><th>chunk id</th><th>span</th><th>status</th><th>backend</th><th>worker</th><th>ms</th>
            </tr></thead>
            <tbody data-lineage><tr><td colspan="7" class="text-center text-faint py-4">—</td></tr></tbody>
          </table>
        </div>
      </details>
    </div>
  </template>

  <script src="app.js?v=3"></script>
</body>
</html>
